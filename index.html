<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lexie — Where Every Story Finds You</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/theme.css"/>
  <link rel="stylesheet" href="css/navbar.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/pages.css"/>
  <link rel="stylesheet" href="css/modal.css"/>
  <link rel="stylesheet" href="css/reader.css"/>
</head>
<body>

  <!-- ═══════════════════════════════════
       NAVBAR
  ═══════════════════════════════════════ -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">

      <div class="nav-logo" onclick="goPage('home')">
        <span class="logo-icon">📖</span>
        <span class="logo-word">Lexie</span>
      </div>

      <div class="nav-search-wrap">
        <div class="nav-search" id="navSearchBox">
          <span class="search-icon-nav">🔍</span>
          <input type="text" id="globalSearch" placeholder="Search books, authors, genres…" autocomplete="off"/>
          <div class="search-dropdown" id="searchDropdown"></div>
        </div>
      </div>

      <div class="nav-right">
        <button class="nav-link" onclick="goPage('home')">Home</button>
        <button class="nav-link" onclick="goPage('browse')">Browse</button>
        <button class="nav-link" onclick="goPage('ai')">🤖 AI</button>
        <button class="nav-link" onclick="goPage('community')">Community</button>
        <button class="theme-btn" id="themeBtn" title="Toggle dark mode">🌙</button>
        <div class="notif-btn" id="notifBtn">
          🔔
          <span class="notif-dot" id="notifDot"></span>
        </div>
        <div class="nav-avatar" id="navAvatar" onclick="goPage('profile')">AK</div>
      </div>

    </div>

    <!-- Genre pill bar -->
    <div class="genre-bar">
      <div class="genre-bar-inner">
        <button class="gpill active" data-genre="All">All</button>
        <button class="gpill" data-genre="Romance">💕 Romance</button>
        <button class="gpill" data-genre="Fantasy">🐉 Fantasy</button>
        <button class="gpill" data-genre="Science Fiction">🚀 Sci-Fi</button>
        <button class="gpill" data-genre="Mystery">🔎 Mystery</button>
        <button class="gpill" data-genre="Horror">👻 Horror</button>
        <button class="gpill" data-genre="Non-Fiction">📖 Non-Fiction</button>
        <button class="gpill" data-genre="Teen Fiction">🌟 Teen Fiction</button>
        <button class="gpill" data-genre="Historical">🏛️ Historical</button>
        <button class="gpill" data-genre="Adventure">⚔️ Adventure</button>
        <button class="gpill" data-genre="Poetry">🎵 Poetry</button>
      </div>
    </div>
  </nav>

  <!-- ═══════════════════════════════════
       NOTIFICATION PANEL
  ═══════════════════════════════════════ -->
  <div class="notif-panel" id="notifPanel">
    <div class="notif-header">
      <span>Notifications</span>
      <button onclick="markAllRead()">Mark all read</button>
    </div>
    <div id="notifList"></div>
  </div>

  <!-- ═══════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════ -->
  <main id="main"></main>

  <!-- ═══════════════════════════════════
       BOOK DETAIL MODAL
  ═══════════════════════════════════════ -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()"></div>
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>

  <!-- ═══════════════════════════════════
       READING SETTINGS PANEL
  ═══════════════════════════════════════ -->
  <div class="read-settings-panel" id="readSettings">
    <div class="rsp-title">Reading Settings</div>
    <div class="rsp-row">
      <label>Font Size</label>
      <div class="rsp-controls">
        <button onclick="changeFontSize(-1)">A−</button>
        <span id="fontSizeLabel">17px</span>
        <button onclick="changeFontSize(1)">A+</button>
      </div>
    </div>
    <div class="rsp-row">
      <label>Theme</label>
      <div class="rsp-controls">
        <button class="theme-chip active" onclick="setReaderTheme('white',this)">White</button>
        <button class="theme-chip" onclick="setReaderTheme('sepia',this)">Sepia</button>
        <button class="theme-chip" onclick="setReaderTheme('dark',this)">Dark</button>
      </div>
    </div>
    <div class="rsp-row">
      <label>Font</label>
      <div class="rsp-controls">
        <button class="theme-chip active" onclick="setReaderFont('sans',this)">Sans</button>
        <button class="theme-chip" onclick="setReaderFont('serif',this)">Serif</button>
        <button class="theme-chip" onclick="setReaderFont('mono',this)">Mono</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- SCRIPTS -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/reader.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/search.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
